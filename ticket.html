<style>
:root {
  --ink: #1C1F24; --ink-2: #14161A; --cream: #F5F1E7; --cream-dim: #EAE4D6;
  --gold: #C7A75C; --gold-light: #E8C877; --gold-dark: #8C6C2C;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--ink); color: var(--cream);
  font-family: 'Inter', system-ui, sans-serif; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.ticket {
  width: 100%; max-width: 460px; background: var(--ink-2);
  border-radius: 22px; border: 1px solid rgba(199,167,92,0.3);
  padding: 32px 28px 26px; box-shadow: 0 30px 70px -20px rgba(0,0,0,0.6);
}
.brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
.brand img { width: 34px; }
.brand span { font-family: 'Fraunces', serif; font-size: 1.2rem; letter-spacing: 0.02em; }
.order-label { text-align: center; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dark); font-weight: 700; }
.order-num {
  text-align: center; font-family: 'Fraunces', serif; font-weight: 700;
  font-size: 3rem; color: var(--gold-light); margin: 6px 0 4px; letter-spacing: 0.02em;
}
.order-time { text-align: center; color: rgba(245,241,231,0.55); font-size: 0.85rem; margin-bottom: 24px; }
.items { border-top: 1px dashed rgba(245,241,231,0.25); border-bottom: 1px dashed rgba(245,241,231,0.25); padding: 18px 0; margin-bottom: 20px; }
.item-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 10px 0; }
.item-row + .item-row { border-top: 1px solid rgba(245,241,231,0.08); }
.item-qty {
  flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px; background: var(--gold);
  color: var(--ink-2); font-weight: 800; font-size: 1rem; display: flex; align-items: center; justify-content: center;
}
.item-info { flex-grow: 1; }
.item-info .name { font-weight: 700; font-size: 1.05rem; }
.item-info .fmt { font-size: 0.78rem; color: rgba(245,241,231,0.55); margin-top: 2px; }
.item-price { font-family: 'Fraunces', serif; font-weight: 700; color: var(--gold-light); white-space: nowrap; }
.total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 22px; }
.total-row span:first-child { font-size: 1rem; font-weight: 600; }
.total-row .amount { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700; color: var(--gold-light); }
.print-btn {
  width: 100%; background: var(--gold); color: var(--ink-2); border: none; padding: 14px;
  border-radius: 12px; font-weight: 700; font-size: 0.95rem; cursor: pointer;
}
.empty { text-align: center; color: rgba(245,241,231,0.6); padding: 30px 0; }
@media print {
  body { background: #fff; padding: 0; }
  .ticket { box-shadow: none; border: none; background: #fff; color: #000; max-width: 100%; }
  .order-num, .item-price, .total-row .amount { color: #000 !important; }
  .order-label { color: #444 !important; }
  .print-btn { display: none; }
}
</style>
</head>
<body>

    <span>K-LETA · COCINA</span>
  </div>
  <p class="order-label">Pedido</p>
  <p class="order-num" id="orderNum">—</p>
  <p class="order-time" id="orderTime"></p>
  <div class="items" id="itemsBox"></div>
  <div class="total-row">
    <span>Total</span>
    <span class="amount" id="totalAmount">0,00 €</span>
  </div>
  <button class="print-btn" id="printBtn" onclick="window.print()">Imprimir ticket</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const itemsParam = params.get('items') || '';
  const total = parseFloat(params.get('total') || '0');
  const t = parseInt(params.get('t') || Date.now(), 10);

  document.getElementById('orderNum').textContent = id || '—';

  const date = new Date(t);
  document.getElementById('orderTime').textContent = date.toLocaleString('es-ES', {
    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
  });

  const itemsBox = document.getElementById('itemsBox');
  if (!id || !itemsParam) {
    itemsBox.innerHTML = '<p class="empty">No se ha podido leer este pedido. Pide al cliente que muestre el mensaje de WhatsApp.</p>';
  } else {
    const rows = itemsParam.split(';').filter(Boolean).map(row => {
      const [nombre, fmt, qty, precio] = row.split('~').map(decodeURIComponent);
      return { nombre, fmt, qty: parseInt(qty, 10), precio: parseFloat(precio) };
    });
    itemsBox.innerHTML = rows.map(r => `
      <div class="item-row">
        <div class="item-qty">${r.qty}</div>
        <div class="item-info">
          <div class="name">${r.nombre}</div>
          <div class="fmt">${r.fmt}</div>
        </div>
        <div class="item-price">${(r.precio * r.qty).toFixed(2).replace('.', ',')} €</div>
      </div>
    `).join('');
  }

  document.getElementById('totalAmount').textContent = total.toFixed(2).replace('.', ',') + ' €';
</script>
